<!doctype html><html><head><meta charset=utf-8><meta name=viewport content=width=device-width,initial-scale=1><meta name=color-scheme content=dark><title>Quotez</title><style>:root{--bg:#0f1216;--card:#171b21;--line:rgba(255,255,255,.11);--text:#f4f6f8;--muted:#aeb6be;--accent:#ff8a33;--green:#3dd68c;--red:#ff6b6b;--blue:#5aa9ff;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:-apple-system,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 var(--sans);-webkit-font-smoothing:antialiased}.wrap{max-width:680px;margin:auto;padding:28px 18px 50px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;border-bottom:3px solid var(--accent);padding-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:12px;border:1px solid var(--line);display:grid;place-items:center;color:var(--accent);font-weight:800;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.name{font-weight:800;font-size:20px}.muted,.contact,small{color:var(--muted)}.contact{text-align:right;font-size:13px}.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px;margin-top:18px}.summary{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.money{font:800 32px/1 var(--mono);color:var(--accent);margin-top:6px}.pill{display:inline-flex;border-radius:999px;padding:5px 12px;margin-top:12px;font-size:13px;font-weight:800;background:rgba(255,138,51,.15);color:var(--accent)}.approved,.paid{background:rgba(61,214,140,.14);color:var(--green)}.declined{background:rgba(255,107,107,.14);color:var(--red)}.invoiced{background:rgba(90,169,255,.14);color:var(--blue)}.section{margin:25px 2px 9px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;font-weight:900;color:var(--muted)}.row{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}.row:last-child{border:0}.row strong{font:800 14px var(--mono);white-space:nowrap}.row small{display:block;font-size:12px;margin-top:2px}.total{background:#1e232b;margin:10px -8px -4px;padding:13px 8px;border-radius:10px}.total strong{font-size:17px;color:var(--accent)}.actions{display:flex;gap:11px;margin-top:16px}.btn{border:0;border-radius:13px;padding:15px;font:800 15px var(--sans);cursor:pointer}.btn.primary{background:var(--accent);color:#13171c}.btn.approve{flex:1;background:var(--green);color:#0b130f}.btn.decline{flex:1;background:transparent;border:1px solid rgba(255,107,107,.45);color:var(--red)}.banner{border-radius:13px;padding:15px 16px;margin-top:14px;font-weight:700}.ok{background:rgba(61,214,140,.14);color:var(--green)}.no{background:rgba(255,107,107,.14);color:var(--red)}.thread{display:flex;flex-direction:column;gap:8px}.msg{max-width:84%;padding:11px 13px;border-radius:14px;background:#1e232b;border:1px solid var(--line);font-size:14px}.msg.customer{align-self:flex-end;background:var(--accent);color:#13171c;border:0;font-weight:700}.composer{display:flex;gap:10px;margin-top:12px}.composer input{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--text);padding:13px;font:15px var(--sans)}.composer button{width:56px}.err{color:var(--red);padding:45px 0;text-align:center}</style></head><body><main class=wrap id=app><div class=err>Loading quote...</div></main><script>const U='https://muftvfvuqxvvcpgfjwdt.supabase.co',K='sb_publishable_2f1bNijMBTdt23TWAtzbSw_w_YcOpGb',A=document.getElementById('app');const raw=new URLSearchParams(location.search).get('token')||(location.href.match(/[?&]token=([^&#]+)/)||[])[1]||'';const token=decodeURIComponent(raw);let q=null,s=null,msgs=[];const esc=v=>String(v||'').replace(/[&<]/g,c=>c=='&'?'&amp;':'&lt;');const money=v=>'$'+Number(v||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});async function rpc(f,a){const r=await fetch(U+'/rest/v1/rpc/'+f,{method:'POST',headers:{apikey:K,Authorization:'Bearer '+K,'Content-Type':'application/json'},body:JSON.stringify(a||{})});if(!r.ok)throw new Error(await r.text());return r.json()}function paid(){return Math.min(Number(q.total)||0,Math.max(0,Number(q.paidAmount)||0))}function bal(){return Math.max(0,(Number(q.total)||0)-paid())}function measurements(){return q.measurements&&q.measurements.length?q.measurements:[{label:q.summary||'Concrete work',area:q.area||0,thickness:q.volume&&q.area?Math.round(q.volume/q.area*1000):0}]}function status(){return {pending:'Awaiting response',approved:'Approved',declined:'Declined',draft:'Draft',invoiced:'Payment due',paid:'Paid'}[q.status]||q.status}function line(a,b,c){return `<div class=row><div><b>${esc(a)}</b>${c?`<small>${esc(c)}</small>`:''}</div><strong>${b}</strong></div>`}function draw(){const b=s.business||{},p=s.payment||{},d=s.defaults||{};document.documentElement.style.setProperty('--accent',d.accent||'#ff8a33');const inv=q.status=='invoiced'||q.status=='paid';let rows='';measurements().forEach(m=>{const parts=[];if(m.thickness)parts.push(m.thickness+'mm thick');if(m.area&&m.thickness)parts.push((m.area*m.thickness/1000).toFixed(2)+' m3 concrete');rows+=line(m.label||'Area',Number(m.area||0).toFixed(1)+' m2',parts.join(' · '))});if(q.notes)rows+=line('Notes','',q.notes);rows+=line('Total',money(q.total));if(q.deposit&&!inv)rows+=line('Deposit required',money(q.deposit));if(paid()>0)rows+=line('Paid to date','-'+money(paid()));rows+=`<div class='row total'><b>${inv?(bal()>0?'Balance due':'Paid in full'):'Quote total'}</b><strong>${money(inv?bal():q.total)}</strong></div>`;let actions='';if(q.status=='pending')actions=`<div class=actions><button class='btn decline' onclick=decline()>Decline</button><button class='btn approve' onclick=approve()>Approve quote</button></div>`;else if(q.status=='approved')actions=`<div class='banner ok'>Quote approved. We will send your invoice shortly.</div>`;else if(q.status=='declined')actions=`<div class='banner no'>Quote declined. Send a message below if you need changes.</div>`;else if(q.status=='invoiced')actions=`<div class=card><div class=section style='margin-top:0'>Pay by bank transfer</div>${line('Account name',esc(p.accountName||b.name||'-'))}${line('BSB',esc(p.bsb||'-'))}${line('Account no.',esc(p.accountNumber||'-'))}${line('Reference',esc(q.invNo||q.ref))}${p.note?`<p class=muted>${esc(p.note)}</p>`:''}</div><button class='btn primary' style='width:100%;margin-top:14px' onclick=paidMsg()>I have paid</button>`;else if(q.status=='paid')actions=`<div class='banner ok'>Payment received. Thank you.</div>`;const logo=b.logo?`<img src=${b.logo} alt>`:esc((b.name||'Quotez').split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase());A.innerHTML=`<div class=top><div class=brand><div class=logo>${logo}</div><div><div class=name>${esc(b.name||'Quotez')}</div><small>${esc(b.tagline||'')}</small></div></div><div class=contact>${esc([b.email,b.phone].filter(Boolean).join(' · '))}</div></div><div class='card summary'><div><small>${inv?'Invoice for':'Quote for'}</small><div class=name>${esc(q.name)}</div><small>${esc(q.addr||'')}</small></div><div><small>${inv?'Amount due':'Total'}</small><div class=money>${money(inv?bal():q.total)}</div></div><span class='pill ${esc(q.status)}'>${esc(status())}</span></div><div class=section>What is included</div><div class=card>${rows}</div>${actions}<div class=section>Messages</div><div class=thread>${msgs.map(m=>`<div class='msg ${esc(m.from)}'>${esc(m.text)}</div>`).join('')}</div><div class=composer><input id=msg placeholder='Message us...' onkeydown='if(event.key==="Enter")sendMsg()'><button class='btn primary' onclick=sendMsg()>Send</button></div>`}async function load(){try{if(!token)throw new Error('Missing token');const d=await rpc('quotez_get_customer_quote',{p_public_token:token});q=d.quote;s=d.settings;msgs=q.messages||[];draw()}catch(e){A.innerHTML=`<div class=err>Could not load this quote link.</div>`;console.error(e)}}async function respond(v){q.status=v;draw();await rpc('quotez_customer_respond',{p_public_token:token,p_status:v,p_message:null})}function approve(){respond('approved')}function decline(){respond('declined')}async function paidMsg(){msgs.push({from:'customer',text:'I have paid.'});draw();await rpc('quotez_add_message',{p_public_token:token,p_sender:'customer',p_body:'I have paid.'})}async function sendMsg(){const i=document.getElementById('msg'),t=i.value.trim();if(!t)return;i.value='';msgs.push({from:'customer',text:t});draw();await rpc('quotez_add_message',{p_public_token:token,p_sender:'customer',p_body:t})}load()</script></body></html>
